name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Run tests with JaCoCo
        run: mvn -B clean jacoco:prepare-agent test jacoco:report -Dmaven.test.failure.ignore=true
        working-directory: maven-basic-project

      - name: Run tests with JaCoCo
        run: mvn -B clean jacoco:prepare-agent test jacoco:report -Dmaven.test.failure.ignore=true
        working-directory: maven-basic-project

      - name: Check test results
        run: |
          FAILURES=$(grep -h 'failures="[0-9]*"' maven-basic-project/target/surefire-reports/*.xml \
            | grep -oP 'failures="\K[0-9]+' \
            | awk '{s+=$1} END {print s+0}')
          ERRORS=$(grep -h 'errors="[0-9]*"' maven-basic-project/target/surefire-reports/*.xml \
            | grep -oP 'errors="\K[0-9]+' \
            | awk '{s+=$1} END {print s+0}')
          TOTAL=$((FAILURES + ERRORS))
          echo "Failed tests: $FAILURES, Errors: $ERRORS, Total: $TOTAL"
          if [ "$TOTAL" -gt 1 ]; then
            echo "More than 1 failed test ($TOTAL). Cancel pipeline."
            exit 1
          fi

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: maven-basic-project/target/site/jacoco/
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    needs: test                
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Spring Boot jar
        run: mvn -B package spring-boot:repackage -DskipTests
        working-directory: maven-basic-project

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: maven-basic-project/target/*-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 7