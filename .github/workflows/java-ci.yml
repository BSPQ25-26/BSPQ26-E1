name: Java CI

# Trigger on push or pull request to main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 17 with Maven cache
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Build and repackage Spring Boot jar
      - name: Build Spring Boot jar
        run: mvn -B clean package spring-boot:repackage -DskipTests
        working-directory: maven-basic-project

      # 4. List build artifacts
      - name: Show build artifacts
        run: ls -l maven-basic-project/target/

      # 5. Upload jar as artifact for CD
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: maven-basic-project/target/*.jar
