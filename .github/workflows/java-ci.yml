name: Java CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      # Tests con JaCoCo (antes del build del jar)
      - name: Run tests with JaCoCo
        run: mvn -B clean jacoco:prepare-agent test jacoco:report -Dmaven.test.failure.ignore=true
        working-directory: maven-basic-project

      # Subir reporte de cobertura como artefacto
      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: maven-basic-project/target/site/jacoco/
          retention-days: 7

      - name: Build Spring Boot jar
        run: mvn -B package spring-boot:repackage -DskipTests
        working-directory: maven-basic-project

      - name: Show build artifacts
        run: ls -l maven-basic-project/target/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: maven-basic-project/target/*-SNAPSHOT.jar
          if-no-files-found: error
          retention-days: 7