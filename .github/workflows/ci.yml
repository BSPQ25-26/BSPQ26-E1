name: Java CI with Maven & Docker

# Run this workflow on pushes or PRs to main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17 with Maven cache
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Start the database defined in docker-compose
      - name: Start database with Docker
        run: docker compose -f database/docker-compose.yml up -d

      # 4. Wait a few seconds to make sure the DB is ready
      - name: Wait for DB to start
        run: sleep 10

      # 5. Build the project and run all tests
      - name: Build & Test with Maven
        run: mvn -B clean verify

      # 6. Optional: list generated files to see the JAR
      - name: Show build artifacts
        run: ls -l maven-basic-project/target/
