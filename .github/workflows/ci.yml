name: Java CI with Maven & Docker

# Trigger on push or pull request to main
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Force Node.js 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Java 17 with Maven cache
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Start database with Docker Compose
      - name: Start database
        run: docker compose -f database/docker-compose.yml up -d

      # 4. Wait a few seconds to ensure the DB is ready
      - name: Wait for database
        run: sleep 10

      # 5. Build and test the Maven project
      - name: Build & Test with Maven
        run: mvn -B clean verify
        working-directory: maven-basic-project

      # 6. Optional: list build artifacts
      - name: Show build artifacts
        run: ls -l maven-basic-project/target/
