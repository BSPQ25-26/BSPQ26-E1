name: Doxygen → GitHub Pages

on:
  push:
    branches: ["main", "feature/doxygen-docs"]
  workflow_dispatch:          # allows manual trigger from the Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Grant GITHUB_TOKEN the permissions needed to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen and Graphviz
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz

      - name: Generate Doxygen documentation
        run: |
          mkdir -p target/site/doxygen
          doxygen Doxyfile
        working-directory: maven-basic-project

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: maven-basic-project/target/site/doxygen/html

  deploy:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
