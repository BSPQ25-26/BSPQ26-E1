<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>User Info</title>
</head>
<body>
<h1>User Info</h1>

<p id="error" style="color:red; display:none"></p>

<div id="info" style="display:none">
    <p><strong>Username:</strong> <span id="username"></span></p>
    <p><strong>Email:</strong> <span id="email"></span></p>
    <p><strong>Balance:</strong> <span id="balance"></span> €</p>
    <br/>
    <!-- Method that makes a button redirect as if it was a href -->
    <button th:onclick="'window.location.href=\'' + @{/web/transaction} + '\';'">To transactions</button>
    <button th:onclick="'window.location.href=\'' + @{/web/categories} + '\';'">To categories</button>
    <button onclick="logout()">Log out</button>
</div>

<script>
    const token = sessionStorage.getItem('token');
    const email = sessionStorage.getItem('email');

    if (!token || !email) {
        window.location.href = '/web/auth/login';
    } else {
        fetch(`/user/${email}?token=${token}`)
            .then(res => {
                if (res.status === 401) {
                    sessionStorage.clear();
                    window.location.href = '/web/auth/login';
                } else if (res.status === 404) {
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('error').textContent = 'User not found';
                } else {
                    return res.json();
                }
            })
            .then(user => {
                if (user) {
                    document.getElementById('username').textContent = user.username;
                    document.getElementById('email').textContent = user.email;
                    document.getElementById('balance').textContent = user.balance;
                    document.getElementById('info').style.display = 'block';
                }
            });
    }

    async function logout() {
        await fetch(`/auth/logout?token=${token}`, { method: 'POST' });
        sessionStorage.clear();
        window.location.href = '/web/auth/login';
    }
</script>
</body>
</html>
