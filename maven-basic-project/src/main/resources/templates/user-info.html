<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>User Info</title>
</head>
<body>
<h1>User Info</h1>

    <div class="login-box profile-container">
        <h1 class="logo">Expen<span>Sense</span></h1>

        <div class="profile-content">
            <div class="avatar"
                 th:text="${username != null ? #strings.toUpperCase(#strings.substring(username, 0, 1)) : 'U'}">U</div>
            <h2 class="user-name" th:text="${username ?: 'Usuario'}">Nombre</h2>
            <p class="user-email" th:text="${email ?: ''}">email@ejemplo.com</p>

            <div class="balance-card">
                <span class="balance-label">Tu Balance Actual</span>
                <span class="balance-amount"
                      th:style="${(balance != null and balance < 0) ? 'color: #ff4d4d' : 'color: #2ecc71'}">
                    <span th:text="${balance != null} ? ${#numbers.formatDecimal(balance, 1, 'POINT', 2, 'COMMA')} : '0,00'">0,00</span> €
                </span>
            </div>

            <div class="debt-row">
                <div class="debt-card debt-positive">
                    <span class="debt-label">Te deben</span>
                    <span class="debt-amount"
                          th:text="${queMeDeben != null} ? ${#numbers.formatDecimal(queMeDeben, 1, 'POINT', 2, 'COMMA')} + ' €' : '0,00 €'">0,00 €</span>
                </div>
                <div class="debt-card debt-negative">
                    <span class="debt-label">Debes</span>
                    <span class="debt-amount"
                          th:text="${queDebo != null} ? ${#numbers.formatDecimal(queDebo, 1, 'POINT', 2, 'COMMA')} + ' €' : '0,00 €'">0,00 €</span>
                </div>
            </div>

            <div class="actions">
                <a th:href="@{/web/transaction}" class="btn-login">Ver Transacciones</a>
                <a th:href="@{/web/categories}" class="btn-secondary">Gestionar Categorías</a>
                <a th:href="@{/web/groups}" class="btn-secondary">Mis Grupos</a>
                <form th:action="@{/web/auth/logout}" method="post" style="margin:0">
                    <button type="submit" class="btn-logout">Cerrar Sesión</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
