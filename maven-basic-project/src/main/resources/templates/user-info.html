<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - My Profile</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="login-box profile-container">
        <h1 class="logo">Expen<span>Sense</span></h1>

        <div class="profile-content">

            <!-- Avatar + identity -->
            <div class="avatar"
                 th:text="${username != null ? #strings.toUpperCase(#strings.substring(username,0,1)) : 'U'}">U</div>
            <h2 class="user-name" th:text="${username ?: 'User'}">Name</h2>
            <p class="user-email" th:text="${email ?: ''}">email@example.com</p>

            <!-- Balance -->
            <div class="balance-card">
                <span class="balance-label">Net Balance</span>
                <span class="balance-amount"
                      th:classappend="${balance != null and balance < 0} ? 'amount-owe' : 'amount-owed'"
                      th:text="${(balance != null ? #numbers.formatDecimal(balance,1,'POINT',2,'COMMA') : '0.00') + ' €'}">
                    0.00 €
                </span>
            </div>

            <!-- Summary row: owes / owed (hidden when zero) -->
            <div class="debt-row"
                 th:if="${(owes != null and owes > 0) or (owed != null and owed > 0)}">
                <div class="debt-card debt-negative" th:if="${owes != null and owes > 0}">
                    <span class="debt-label">You owe</span>
                    <span class="debt-amount"
                          th:text="${#numbers.formatDecimal(owes,1,'POINT',2,'COMMA')} + ' €'">0.00 €</span>
                </div>
                <div class="debt-card debt-positive" th:if="${owed != null and owed > 0}">
                    <span class="debt-label">Owed to you</span>
                    <span class="debt-amount"
                          th:text="${#numbers.formatDecimal(owed,1,'POINT',2,'COMMA')} + ' €'">0.00 €</span>
                </div>
            </div>

            <!-- ===== DEBES (user is debtor) ===== -->
            <div class="debt-section"
                 th:if="${debtsAsDebtor != null and !debtsAsDebtor.empty}">
                <h3 class="debt-section-title">You Owe</h3>

                <div th:each="d : ${debtsAsDebtor}" class="debt-item debt-item-owe">
                    <div class="debt-item-info">
                        <p class="debt-item-concepto"
                           th:text="${d.transaccionOriginal.concepto}">Concepto</p>
                        <p class="debt-item-person">
                            A: <span th:text="${d.acreedor.nombre}">Acreedor</span>
                        </p>
                    </div>
                    <span class="debt-item-amount amount-owe"
                          th:text="${#numbers.formatDecimal(d.importe,1,'POINT',2,'COMMA')} + ' €'">0.00 €</span>
                    <form th:action="@{/web/transaction/pay-debt}" method="post" style="margin:0">
                        <input type="hidden" name="deudaId" th:value="${d.id}">
                        <button type="submit" class="btn-pay"
                                onclick="return confirm('Pay this debt?')">Pay</button>
                    </form>
                </div>
            </div>

            <!-- ===== TE DEBEN (user is creditor) ===== -->
            <div class="debt-section"
                 th:if="${debtsAsCreditor != null and !debtsAsCreditor.empty}">
                <h3 class="debt-section-title">Owed to you</h3>

                <div th:each="d : ${debtsAsCreditor}" class="debt-item debt-item-owed">
                    <div class="debt-item-info">
                        <p class="debt-item-concepto"
                           th:text="${d.transaccionOriginal.concepto}">Concepto</p>
                        <p class="debt-item-person">
                            De: <span th:text="${d.deudor.nombre}">Deudor</span>
                        </p>
                    </div>
                    <span class="debt-item-amount amount-owed"
                          th:text="${#numbers.formatDecimal(d.importe,1,'POINT',2,'COMMA')} + ' €'">0.00 €</span>
                </div>
            </div>

            <!-- No debts at all -->
            <p th:if="${(debtsAsDebtor == null or debtsAsDebtor.empty)
                        and (debtsAsCreditor == null or debtsAsCreditor.empty)}"
               class="no-debts-msg">
                No pending debts 🎉
            </p>

            <!-- Action buttons -->
            <div class="actions">
                <a th:href="@{/web/transaction}" class="btn-login">View Transactions</a>
                <a th:href="@{/web/categories}" class="btn-secondary">Manage Categories</a>
                <a th:href="@{/web/groups}" class="btn-secondary">My Groups</a>
                <form th:action="@{/web/auth/logout}" method="post" style="margin:0">
                    <button type="submit" class="btn-logout">Sign Out</button>
                </form>
            </div>

        </div>
    </div>

</body>
</html>
