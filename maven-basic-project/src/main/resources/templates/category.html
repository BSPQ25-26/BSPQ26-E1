<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="transaction-body">

    <div class="nav-header">
        <a th:href="@{/web/user/profile}" class="logo">Expen<span>Sense</span></a>
        <div class="nav-right">
            <div class="lang-switcher">
                <a th:href="@{/web/categories(lang=en)}">EN</a> |
                <a th:href="@{/web/categories(lang=es)}">ES</a>
            </div>
            <a th:href="@{/web/user/profile}" class="back-link" th:text="#{nav.back}">← Back to Profile</a>
        </div>
    </div>

    <div class="container-grid" th:classappend="${showForm} ? ' panel-open' : ''">

        <!-- ===== LIST ===== -->
        <div class="glass-card card-lista">
            <div class="header-inline">
                <h2 class="card-title" th:text="#{cat.title}">Categories</h2>
                <div class="button-group-top">
                    <a th:href="@{/web/categories(showForm=true)}" th:if="${!showForm}" class="btn-add" th:title="#{cat.new_btn_title}">＋</a>
                    <a th:href="@{/web/categories}" th:if="${showForm}" class="btn-add" th:title="#{cat.hide_form_title}">✕</a>
                    <a th:href="@{/web/categories}" class="btn-refresh" th:title="#{cat.refresh_title}">↻</a>
                </div>
            </div>

            <div id="categoriesGrid" class="categories-grid">
                <p th:if="${listaCategorias.empty}"
                   style="grid-column:1/-1; text-align:center; color:#999; padding:20px;"
                   th:text="#{cat.empty}">
                    No categories yet.
                </p>
                <div th:each="cat : ${listaCategorias}" class="category-card">
                    <form th:action="@{/web/categories/delete}" method="post"
                          style="position:absolute; top:8px; right:8px; margin:0"
                          th:onsubmit="|return confirm('#{cat.delete_confirm}')|">
                        <input type="hidden" name="categoryId" th:value="${cat.id}">
                        <button type="submit" class="btn-mini-delete" th:title="#{cat.delete_title}">🗑</button>
                    </form>
                    <div class="category-icon">📁</div>
                    <h3 th:text="${cat.name}">Name</h3>
                </div>
            </div>
        </div>

        <!-- ===== NEW CATEGORY FORM ===== -->
        <div class="glass-card card-principal panel-visible" th:if="${showForm}">
            <h2 class="card-title" th:text="#{cat.form_title}">New Category</h2>

            <form th:action="@{/web/categories/create}" method="post">
                <div class="input-group">
                    <label th:text="#{cat.name_label}">Category Name</label>
                    <input name="name" th:placeholder="#{cat.name_placeholder}" placeholder="e.g. Leisure, Health..." required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-login" th:text="#{cat.create_btn}">Create Category</button>
                    <a th:href="@{/web/categories}" class="btn-logout" th:text="#{common.cancel}">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
