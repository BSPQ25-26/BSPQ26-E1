<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Categories</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="transaction-body">

    <!-- ===== NAVBAR ===== -->
    <div class="nav-header">
        <a th:href="@{/web/user/profile}" class="logo">Expen<span>Sense</span></a>
        <div class="nav-right">
            <div class="lang-switcher">
                <a th:href="@{/web/categories(lang=en)}">EN</a> |
                <a th:href="@{/web/categories(lang=es)}">ES</a>
            </div>
            <a th:href="@{/web/user/profile}" class="back-link" th:text="#{nav.back}">← Back to Profile</a>
        </div>
    </div>

    <div class="container-grid" th:classappend="${showForm} ? ' panel-open' : ''">

        <!-- ===== CATEGORIES LIST ===== -->
        <div class="glass-card card-lista">
            <div class="header-inline">
                <h2 class="card-title" th:text="#{cat.title}">Categories</h2>
                <div class="button-group-top">
                    <a th:href="@{/web/categories(showForm=true)}" th:if="${!showForm}" class="btn-add" th:title="#{cat.new_btn_title}">＋</a>
                    <a th:href="@{/web/categories}" th:if="${showForm}" class="btn-add" th:title="#{cat.hide_form_title}">✕</a>
                    <a th:href="@{/web/categories}" class="btn-refresh" th:title="#{cat.refresh_title}">↻</a>
                </div>
            </div>

            <div class="month-nav">
                <a class="month-nav-arrow"
                   th:href="@{/web/categories(month=${prevMonth}, year=${prevYear})}">&#8249;</a>
                <span class="month-nav-label" th:text="${monthLabel}">May 2026</span>
                <a class="month-nav-arrow"
                   th:classappend="${isCurrentMonth} ? ' month-nav-arrow--disabled'"
                   th:href="${isCurrentMonth} ? '#' : @{/web/categories(month=${nextMonth}, year=${nextYear})}">&#8250;</a>
            </div>

            <div class="categories-grid">
                <p th:if="${listaCategorias.empty}"
                   style="grid-column:1/-1; text-align:center; color:#999; padding:30px 0;">
                    No categories yet. Create your first one!
                </p>

                <div th:each="cat : ${listaCategorias}" class="category-card">

                    <!-- Header -->
                    <div class="cat-header">
                        <span class="category-icon" th:text="${cat.emoji}">📂</span>
                        <div class="cat-title-wrap">
                            <h3 th:text="${cat.displayName}">Category Name</h3>
                        </div>
                        <div class="cat-header-amounts" th:if="${cat.totalExpenses != 0 or cat.totalIncome != 0}">
                            <span class="cat-amount-chip expense-chip"
                                  th:if="${cat.totalExpenses != 0}"
                                  th:text="${'-' + #numbers.formatDecimal(cat.totalExpenses, 1, 2) + ' €'}">
                            </span>
                            <span class="cat-amount-chip income-chip"
                                  th:if="${cat.totalIncome != 0}"
                                  th:text="${'+' + #numbers.formatDecimal(cat.totalIncome, 1, 2) + ' €'}">
                            </span>
                        </div>
                        <form th:action="@{/web/categories/delete}" method="post"
                              style="margin:0; flex-shrink:0"
                              onsubmit="return confirm('Delete this category?')">
                            <input type="hidden" name="categoryId" th:value="${cat.category.id}">
                            <button type="submit" class="btn-mini-delete" title="Delete">🗑</button>
                        </form>
                    </div>

                    <!-- Budget -->
                    <div class="cat-budget-section">
                        <div th:if="${cat.overBudget}" class="cat-alert-budget">
                            ⚠ Spending limit exceeded!
                        </div>

                        <div th:if="${cat.budgetLimit != null}" class="cat-budget-bar-wrap">
                            <div class="cat-budget-header">
                                <span class="cat-stat-label">Spending Limit</span>
                                <span class="cat-budget-amounts"
                                      th:text="${#numbers.formatDecimal(cat.totalExpenses, 1, 2)
                                               + ' / '
                                               + #numbers.formatDecimal(cat.budgetLimit, 1, 2) + ' €'}">
                                </span>
                            </div>
                            <div class="cat-progress-track">
                                <div class="cat-progress-fill"
                                     th:classappend="${cat.overBudget} ? ' over-limit' : ''"
                                     th:style="'width:' + ${cat.budgetPercent} + '%'">
                                </div>
                            </div>
                        </div>

                        <details class="cat-budget-set">
                            <summary th:text="${cat.budgetLimit != null} ? 'Edit limit' : '+ Set spending limit'">
                                + Set spending limit
                            </summary>
                            <form th:action="@{/web/categories/budget}" method="post" class="cat-budget-form">
                                <input type="hidden" name="categoryId" th:value="${cat.category.id}">
                                <input type="number" name="limitAmount" step="0.01" min="0.01"
                                       th:value="${cat.budgetLimit}" placeholder="e.g. 200.00" required>
                                <button type="submit" class="btn-budget-save">Save</button>
                            </form>
                        </details>
                    </div>

                    <!-- This month's transactions -->
                    <details class="cat-tx-list" th:if="${!cat.transactions.isEmpty()}">
                        <summary th:text="|${cat.transactions.size()} ${cat.transactions.size() != 1 ? 'transactions' : 'transaction'} this month|">
                        </summary>
                        <ul class="cat-tx-items">
                            <li th:each="tx, s : ${cat.transactions}" th:if="${s.index < 5}" class="cat-tx-item">
                                <span class="cat-tx-name" th:text="${tx.concepto}">Item</span>
                                <span class="cat-tx-amount"
                                      th:classappend="${'INGRESO'.equals(tx.tipoTransaccion)} ? ' text-green' : ' text-red'"
                                      th:text="${('INGRESO'.equals(tx.tipoTransaccion) ? '+' : '-')
                                               + #numbers.formatDecimal(tx.importeTotal, 1, 2) + ' €'}">
                                </span>
                            </li>
                        </ul>
                    </details>

                </div>
            </div>
        </div>

        <!-- ===== NEW CATEGORY FORM ===== -->
        <div class="glass-card card-principal panel-visible" th:if="${showForm}">
            <h2 class="card-title">New Category</h2>
            <p class="form-subtitle">Choose a name and pick an emoji icon.</p>

            <form th:action="@{/web/categories/create}" method="post">
                <div class="input-group">
                    <label>Category Name</label>
                    <input type="text" name="name" placeholder="e.g. Food, Transport, Leisure…" required autofocus>
                </div>

                <div class="input-group">
                    <label>Icon</label>
                    <div class="emoji-picker-wrap" id="emojiPickerWrap">
                        <div class="emoji-trigger-row">
                            <span class="emoji-preview" id="emojiPreview">📌</span>
                            <button type="button" class="btn-pick-emoji" onclick="toggleEmojiPicker()">Select Emoji</button>
                        </div>
                        <input type="hidden" name="icon" id="iconInput" value="">
                        <div class="emoji-popover" id="emojiPopover"></div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-login" th:text="#{cat.create_btn}">Create Category</button>
                    <a th:href="@{/web/categories}" class="btn-logout" th:text="#{common.cancel}">Cancel</a>
                </div>
            </form>
        </div>

    </div>

    <!-- ===== SCRIPTS ===== -->
    <script src="https://cdn.jsdelivr.net/npm/emoji-mart@5/dist/browser.js"></script>
    <script>
        let picker = null;

        function toggleEmojiPicker() {
            const popover = document.getElementById('emojiPopover');
            if (popover.classList.contains('open')) {
                popover.classList.remove('open');
                return;
            }
            if (!picker) {
                picker = new EmojiMart.Picker({
                    onEmojiSelect(emoji) {
                        document.getElementById('emojiPreview').textContent = emoji.native;
                        document.getElementById('iconInput').value = emoji.native;
                        document.getElementById('emojiPopover').classList.remove('open');
                    },
                    theme: 'light',
                    locale: 'en',
                });
                popover.appendChild(picker);
            }
            popover.classList.add('open');
        }

        document.addEventListener('click', function (e) {
            const wrap = document.getElementById('emojiPickerWrap');
            const popover = document.getElementById('emojiPopover');
            if (wrap && popover && !wrap.contains(e.target)) {
                popover.classList.remove('open');
            }
        });
    </script>
</body>
</html>
