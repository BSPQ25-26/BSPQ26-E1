<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Login</title>
</head>
<body>
<h1>Category UI</h1>

    <div class="nav-header">
        <a th:href="@{/web/user/profile}" class="logo">Expen<span>Sense</span></a>
        <a th:href="@{/web/user/profile}" class="back-link">← Volver al Perfil</a>
    </div>

    <div class="container-grid">

        <!-- ===== LISTA ===== -->
        <div class="glass-card card-lista">
            <div class="header-inline">
                <h2 class="card-title">Categorías</h2>
                <div class="button-group-top">
                    <a th:href="@{/web/categories(showForm=true)}" class="btn-add" title="Nueva categoría">＋</a>
                    <a th:href="@{/web/categories}" class="btn-refresh" title="Refrescar">↻</a>
                </div>
            </div>

            <div id="categoriesGrid" class="categories-grid">
                <p th:if="${listaCategorias.empty}"
                   style="grid-column:1/-1; text-align:center; color:#999; padding:20px;">
                    No hay categorías aún.
                </p>
                <div th:each="cat : ${listaCategorias}" class="category-card">
                    <form th:action="@{/web/categories/delete}" method="post"
                          style="position:absolute; top:8px; right:8px; margin:0"
                          onsubmit="return confirm('¿Borrar categoría?')">
                        <input type="hidden" name="categoryId" th:value="${cat.id}">
                        <button type="submit" class="btn-mini-delete" title="Borrar">🗑</button>
                    </form>
                    <div class="category-icon">📁</div>
                    <h3 th:text="${cat.name}">Nombre</h3>
                </div>
            </div>
        </div>

        <!-- ===== FORMULARIO nueva categoría ===== -->
        <div class="glass-card card-principal" th:if="${showForm}">
            <h2 class="card-title">Nueva Categoría</h2>

            <form th:action="@{/web/categories/create}" method="post">
                <div class="input-group">
                    <label>Nombre de Categoría</label>
                    <input name="name" placeholder="Ej: Ocio, Salud..." required>
                </div>
                <div class="button-group">
                    <button type="submit" class="btn-login">Crear Categoría</button>
                    <a th:href="@{/web/categories}" class="btn-logout">Cancelar</a>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
