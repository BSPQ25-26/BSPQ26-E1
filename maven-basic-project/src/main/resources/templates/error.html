<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Error</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<h1 th:text="#{error.title}">Error</h1>

<p style="color:red" th:text="${error}">There has been an error</p>

<br/>
<a th:href="@{/web/auth/login}" th:text="#{error.back}">← Back to login</a>

<footer class="lang-footer">
    <a th:href="@{/web/auth/login(lang=en)}">EN</a> |
    <a th:href="@{/web/auth/login(lang=es)}">ES</a>
</footer>
</body>
</html>
