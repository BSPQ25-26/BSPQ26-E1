<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Movimientos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="transaction-body">

    <div class="nav-header">
        <a th:href="@{/web/user/profile}" class="logo">Expen<span>Sense</span></a>
        <a th:href="@{/web/user/profile}" class="back-link">← Volver al Perfil</a>
    </div>

    <div class="container-grid">

        <!-- ===== LISTA ===== -->
        <div class="glass-card card-lista">
            <div class="header-inline">
                <h2 class="card-title">Mis Movimientos</h2>
                <div class="button-group-top">
                    <a th:href="@{/web/transaction(showForm=true)}" class="btn-add" title="Añadir nuevo">＋</a>
                    <a th:href="@{/web/transaction}" class="btn-refresh" title="Refrescar">↻</a>
                </div>
            </div>

            <div th:if="${error}" class="flash-error" th:text="${error}"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Concepto</th>
                            <th>Importe</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${listaTransacciones.empty}">
                            <td colspan="3" style="text-align:center; padding:40px; color:#999;">
                                <div style="font-size:40px">📂</div>
                                <p>No hay movimientos aún.<br>Pulsa el botón <b>+</b> para empezar.</p>
                            </td>
                        </tr>
                        <tr th:each="t : ${listaTransacciones}">
                            <td th:text="${t.concepto}">Concepto</td>
                            <td th:classappend="${t.tipoTransaccion == 'GASTO'} ? 'text-red' : 'text-green'"
                                th:text="${#numbers.formatDecimal(t.importeTotal, 1, 'POINT', 2, 'COMMA')} + ' €'">0,00 €</td>
                            <td style="white-space:nowrap">
                                <a th:href="@{/web/transaction(editId=${t.id})}"
                                   class="btn-mini-edit" title="Editar">✏️</a>
                                <form th:action="@{/web/transaction/delete}" method="post"
                                      style="display:inline"
                                      onsubmit="return confirm('¿Seguro que quieres borrar esto?')">
                                    <input type="hidden" name="transactionId" th:value="${t.id}">
                                    <button type="submit" class="btn-mini-delete" title="Borrar">🗑️</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ===== FORMULARIO (crear o editar) ===== -->
        <div class="glass-card card-principal" th:if="${showForm}">

            <h2 class="card-title"
                th:text="${editTransaction != null} ? 'Editar Transacción' : 'Registrar Movimiento'">
                Registrar Movimiento
            </h2>

            <form th:action="${editTransaction != null}
                                ? @{/web/transaction/edit/{id}(id=${editTransaction.id})}
                                : @{/web/transaction/create}"
                  method="post">

                <div class="input-group">
                    <label>Concepto</label>
                    <input name="concepto" placeholder="Ej: Cena amigos"
                           th:value="${editTransaction != null} ? ${editTransaction.concepto} : ''"
                           required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Importe (€)</label>
                        <input name="importeTotal" type="number" step="0.01" min="0.01"
                               placeholder="0.00"
                               th:value="${editTransaction != null} ? ${editTransaction.importeTotal} : ''"
                               required>
                    </div>
                    <div class="input-group">
                        <label>Tipo</label>
                        <select name="tipoTransaccion" required>
                            <option value="">-- Selecciona --</option>
                            <option value="GASTO"
                                    th:selected="${editTransaction != null and editTransaction.tipoTransaccion == 'GASTO'}">GASTO</option>
                            <option value="INGRESO"
                                    th:selected="${editTransaction != null and editTransaction.tipoTransaccion == 'INGRESO'}">INGRESO</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Categoría</label>
                        <select name="categoriaId">
                            <option value="">-- Sin categoría --</option>
                            <option th:each="cat : ${listaCategorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${editTransaction != null
                                                   and editTransaction.categoria != null
                                                   and editTransaction.categoria.id == cat.id}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Grupo</label>
                        <select name="grupoId">
                            <option value="">-- Sin grupo --</option>
                            <option th:each="g : ${listaGrupos}"
                                    th:value="${g.id}"
                                    th:text="${g.nombre}"
                                    th:selected="${editTransaction != null
                                                   and editTransaction.grupo != null
                                                   and editTransaction.grupo.id == g.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-login"
                            th:text="${editTransaction != null} ? 'Actualizar Cambios' : 'Guardar Transacción'">
                        Guardar Transacción
                    </button>
                    <a th:href="@{/web/transaction}" class="btn-logout">Cancelar</a>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
