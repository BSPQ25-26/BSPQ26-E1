<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Transactions</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="nav-header">
        <a th:href="@{/web/user/profile}" class="logo">Expen<span>Sense</span></a>
        <a th:href="@{/web/user/profile}" class="back-link">← Back to Profile</a>
    </div>

    <div class="container-grid">

        <!-- ===== LIST ===== -->
        <div class="glass-card card-lista">
            <div class="header-inline">
                <h2 class="card-title">My Transactions</h2>
                <div class="button-group-top">
                    <a th:href="@{/web/transaction(showForm=true)}" th:if="${!showForm}" class="btn-add" title="Add new">＋</a>
                    <a th:href="@{/web/transaction}" th:if="${showForm}" class="btn-add" title="Hide form">✕</a>
                    <a th:href="@{/web/transaction}" class="btn-refresh" title="Refresh">↻</a>
                </div>
            </div>

            <div th:if="${error}" class="flash-error" th:text="${error}"></div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${transactions.empty}">
                            <td colspan="3" style="text-align:center; padding:40px; color:#999;">
                                <div style="font-size:40px">📂</div>
                                <p>No transactions yet.<br>Press the <b>+</b> button to get started.</p>
                            </td>
                        </tr>
                        <tr th:each="t : ${transactions}">
                            <td th:text="${t.concepto}">Description</td>
                            <td th:classappend="${t.tipoTransaccion == 'EXPENSE'} ? 'text-red' : 'text-green'"
                                th:text="${#numbers.formatDecimal(t.importeTotal, 1, 'POINT', 2, 'COMMA')} + ' €'">0.00 €</td>
                            <td style="white-space:nowrap">
                                <a th:href="@{/web/transaction(editId=${t.id})}"
                                   class="btn-mini-edit" title="Edit">✏️</a>
                                <form th:action="@{/web/transaction/delete}" method="post"
                                      style="display:inline"
                                      onsubmit="return confirm('Are you sure you want to delete this?')">
                                    <input type="hidden" name="transactionId" th:value="${t.id}">
                                    <button type="submit" class="btn-mini-delete" title="Delete">🗑️</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ===== FORM (create or edit) ===== -->
        <div class="glass-card card-principal" th:if="${showForm}">

            <h2 class="card-title"
                th:text="${editTransaction != null} ? 'Edit Transaction' : 'New Transaction'">
                New Transaction
            </h2>

            <form th:action="${editTransaction != null}
                                ? @{/web/transaction/edit/{id}(id=${editTransaction.id})}
                                : @{/web/transaction/create}"
                  method="post">

                <div class="input-group">
                    <label>Description</label>
                    <input name="concepto" placeholder="e.g. Dinner with friends"
                           th:value="${editTransaction != null} ? ${editTransaction.concepto} : ''"
                           required>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Amount (€)</label>
                        <input name="importeTotal" type="number" step="0.01" min="0.01"
                               placeholder="0.00"
                               th:value="${editTransaction != null} ? ${editTransaction.importeTotal} : ''"
                               required>
                    </div>
                    <div class="input-group">
                        <label>Type</label>
                        <select name="tipoTransaccion" required>
                            <option value="">-- Select --</option>
                            <option value="EXPENSE"
                                    th:selected="${editTransaction != null and editTransaction.tipoTransaccion == 'EXPENSE'}">EXPENSE</option>
                            <option value="INCOME"
                                    th:selected="${editTransaction != null and editTransaction.tipoTransaccion == 'INCOME'}">INCOME</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label>Category</label>
                        <select name="categoriaId">
                            <option value="">-- No category --</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${editTransaction != null
                                                   and editTransaction.categoria != null
                                                   and editTransaction.categoria.id == cat.id}">
                            </option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Group</label>
                        <select name="grupoId">
                            <option value="">-- No group --</option>
                            <option th:each="g : ${groups}"
                                    th:value="${g.id}"
                                    th:text="${g.nombre}"
                                    th:selected="${editTransaction != null
                                                   and editTransaction.grupo != null
                                                   and editTransaction.grupo.id == g.id}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-login"
                            th:text="${editTransaction != null} ? 'Save Changes' : 'Save Transaction'">
                        Save Transaction
                    </button>
                    <a th:href="@{/web/transaction}" class="btn-logout">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</body>
</html>
