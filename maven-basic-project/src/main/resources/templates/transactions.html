<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Movimientos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="transaction-body">

    <div class="nav-header">
        <a th:href="@{/web/user/info}" class="logo">Expen<span>Sense</span></a>
        <a th:href="@{/web/user/info}" class="back-link">← Volver al Perfil</a>
    </div>
    <div class="container-grid">
        
        <div class="glass-card card-principal">
            <h2 class="card-title">Registrar Movimiento</h2>
            
            <div class="input-group">
                <label>Concepto</label>
                <input id="conceptC" placeholder="Ej: Cena amigos">
            </div>
            
            <div class="form-row">
                <div class="input-group">
                    <label>Importe (€)</label>
                    <input id="createAmountC" type="number" step="0.01" placeholder="0.00" class="input-accent">
                </div>
                <div class="input-group">
                    <label>Tipo</label>
                    <input id="typeC" placeholder="GASTO / INGRESO">
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Category ID</label>
                    <input id="catIdC" type="number" placeholder="ID">
                </div>
                <div class="input-group">
                    <label>Group ID</label>
                    <input id="groupIdC" type="number" placeholder="ID">
                </div>
            </div>

            <div class="input-group">
                <label>Creator ID</label>
                <input id="creatorC" type="number" placeholder="Tu ID de usuario">
            </div>

            <button class="btn-login" onclick="createTransaction()">Guardar Transacción</button>
        </div>

        <div class="glass-card card-editar">
            <h2 class="card-title">Editar</h2>
            <p class="info-text">Introduce el ID y usa el formulario de la izquierda para los nuevos datos.</p>
            <div class="input-group">
                <label>ID DE LA TRANSACCIÓN</label>
                <input id="editId" class="input-id-highlight" placeholder="Ej: 125">
            </div>
            <button class="btn-edit-action" onclick="editTransaction()">Actualizar Datos</button>
        </div>

        <div class="glass-card card-borrar">
            <h2 class="card-title title-danger">Borrar Transacción</h2>
            <div class="input-group">
                <input id="deleteId" placeholder="ID a borrar" class="input-delete-small">
            </div>
            <button class="btn-delete-action" onclick="deleteTransaction()">Eliminar por ID</button>
        </div>
        
    </div> <script th:inline="javascript">
        const BASE_URL = "/transaction";
        function getToken() {
            const token = sessionStorage.getItem("token");
            if (!token) { window.location.href = '/web/auth/login'; return null; }
            return token;
        }
        function createTransaction() {
            const token = getToken();
            fetch(BASE_URL + "/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    token: token,
                    concepto: document.getElementById("conceptC").value,
                    importeTotal: document.getElementById("createAmountC").value,
                    tipoTransaccion: document.getElementById("typeC").value,
                    categoriaId: document.getElementById("catIdC").value,
                    groupId: document.getElementById("groupIdC").value,
                    creadorId: document.getElementById("creatorC").value
                })
            }).then(res => showResult(res, "creada")).catch(err => showError(err));
        }
        function deleteTransaction() {
            const token = getToken();
            const id = document.getElementById("deleteId").value; 
            if(!id) return showError("Debes indicar un ID");
            fetch(BASE_URL + "/delete", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ accessToken: token, transactionId: id })
            }).then(res => showResult(res, "eliminada")).catch(err => showError(err));
        }
        function editTransaction() {
            const token = getToken();
            const id = document.getElementById("editId").value;
            if(!id) return showError("Indica el ID en el recuadro azul");
            fetch(BASE_URL + "/edit/" + id, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    accessToken: token,
                    concepto: document.getElementById("conceptC").value,
                    importeTotal: document.getElementById("createAmountC").value,
                    tipoTransaccion: document.getElementById("typeC").value,
                    categoriaId: document.getElementById("catIdC").value,
                    groupId: document.getElementById("groupIdC").value,
                    creadorId: document.getElementById("creatorC").value
                })
            }).then(res => showResult(res, "editada")).catch(err => showError(err));
        }
        function showResult(res, action) {
            const resDiv = document.getElementById("result");
            if(res.ok) {
                resDiv.style.background = "#dcfce7";
                resDiv.style.color = "#166534";
                resDiv.style.border = "1px solid #bbf7d0";
                resDiv.innerText = `Transacción ${action} con éxito (Status: ${res.status})`;
            } else {
                resDiv.style.background = "#fee2e2";
                resDiv.style.color = "#dc2626";
                resDiv.style.border = "1px solid #fecaca";
                resDiv.innerText = `Error: ${res.status}`;
            }
        }
        function showError(err) {
            const resDiv = document.getElementById("result");
            resDiv.style.background = "#fee2e2";
            resDiv.innerText = "Error: " + err;
        }
    </script>
</body>
</html>
