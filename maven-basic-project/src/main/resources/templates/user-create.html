<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Create Account</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <h1 class="logo">Expen<span>Sense</span></h1>
        <p class="subtitle">Start tracking your finances.</p>

        <div th:if="${error}" th:text="${error}" class="error-msg"></div>
        <div th:if="${message}" th:text="${message}" class="alert-success"></div>

        <form th:action="@{/web/user/create}" th:object="${userCreationDTO}" method="post">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" th:field="*{username}" placeholder="Your name" required/>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" th:field="*{email}" placeholder="name@example.com" required/>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" th:field="*{password}" placeholder="••••••••" required/>
            </div>
            <div class="input-group">
                <label for="balance">Starting Balance (€)</label>
                <input type="number" id="balance" th:field="*{balance}" step="0.01" value="0.00" class="input-balance"/>
            </div>
            <button type="submit" class="btn-login">Create Account</button>
        </form>

        <div class="footer">
            Already have an account? <a th:href="@{/web/auth/login}">Sign in</a>
        </div>
    </div>
</body>
</html>
