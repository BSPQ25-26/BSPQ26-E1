<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Crear cuenta</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
<h1>Create User</h1>

<p th:if="${error}" th:text="${error}" style="color:red"></p>
<p th:if="${message}" th:text="${message}" style="color:green"></p>

<form method="post" action="/web/user/create">
    <label>Username: <input type="text" name="username" required/></label><br/><br/>
    <label>Email: <input type="email" name="email" required/></label><br/><br/>
    <label>Contraseña: <input type="password" name="password" required/></label><br/><br/>
    <label>Balance: <input type="number" name="balance" step="0.01" value="0.00"/></label><br/><br/>
    <button type="submit">Create</button>
</form>
<br/>
<a th:href="@{/web/auth/login}">Log in</a>
</body>
</html>
