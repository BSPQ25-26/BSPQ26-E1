<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenSense - Login</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <h1 class="logo">Expen<span>Sense</span></h1>
        <p class="subtitle">Tus finanzas, con sentido.</p>

        <div th:if="${error}" th:text="${error}" class="error-msg"></div>

        <form th:action="@{/web/auth/login}" method="post">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="nombre@correo.com" required/>
            </div>
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required/>
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="footer">
            ¿Nuevo aquí? <a href="/web/user/create">Crea una cuenta</a>
        </div>
    </div>
</body>
</html>
