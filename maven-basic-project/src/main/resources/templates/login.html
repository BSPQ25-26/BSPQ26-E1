<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Login</title>
</head>
<body>
<h1>Login</h1>

<p id="error" style="color:red; display:none"></p>

<label>Email: <input type="email" id="email"/></label><br/><br/>
<label>Password: <input type="password" id="password"/></label><br/><br/>
<button onclick="login()">Log in</button> <button onclick="logout()">Logout (for debuggin)</button>
<br/><br/>
<a href="/web/user/create">Sign in</a>

<script>
    // Si ya tiene token, redirige directamente
    if (sessionStorage.getItem('token')) {
        window.location.href = '/web/user/info';
    }

    async function login() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        if (response.ok) {
            const token = await response.text();
            sessionStorage.setItem('token', token);
            sessionStorage.setItem('email', email);
            window.location.href = '/web/user/info';
        } else {
            const error = document.getElementById('error');
            error.style.display = 'block';
            error.textContent = 'Invalid credentials';
        }
    }

    async function logout() {
        const token = sessionStorage.getItem('token');
        await fetch(`/auth/logout?token=${token}`, { method: 'POST' });
        sessionStorage.clear();
        window.location.href = '/web/auth/login';
    }
</script>
</body>
</html>
