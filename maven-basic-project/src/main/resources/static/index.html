<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpenSense</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" opacity="0"/>
        <path d="M11.5 2C6.26 2 2 6.26 2 11.5S6.26 21 11.5 21 21 16.74 21 11.5 16.74 2 11.5 2zm.5 16v-1.5c-1.96-.4-3.5-1.96-3.5-3.9h1.75c0 1.05.85 1.9 1.9 1.9 1.05 0 1.9-.85 1.9-1.9 0-1.05-.85-1.9-1.9-1.9-2.07 0-3.65-1.58-3.65-3.65 0-1.94 1.54-3.5 3.5-3.9V3.5h1v1.65c1.96.4 3.5 1.96 3.5 3.9H14.75c0-1.05-.85-1.9-1.9-1.9-1.05 0-1.9.85-1.9 1.9 0 1.05.85 1.9 1.9 1.9 2.07 0 3.65 1.58 3.65 3.65 0 1.94-1.54 3.5-3.5 3.9V18h-1z"/>
      </svg>
    </div>
    <h1>ExpenSense</h1>
    <p>Track income & expenses together</p>
  </div>

  <div class="card">
    <!-- Session panel (shown after login) -->
    <div class="session-panel" id="sessionPanel">
      <div class="session-header">
        <div class="avatar" id="avatarInitial">?</div>
        <div class="session-info">
          <h3 id="sessionNombre">—</h3>
          <span class="badge-ok">
            <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="4"/></svg>
            Logged in
          </span>
        </div>
      </div>
      <div class="info-row">
        <span class="label">User ID</span>
        <span class="value" id="sessionUserId">—</span>
      </div>
      <div class="token-row">
        <div class="label">Access Token</div>
        <div class="token-box">
          <div class="token-text" id="sessionToken">—</div>
          <button class="copy-btn" onclick="copyToken()">Copy</button>
        </div>
      </div>
      <div id="logoutAlert" class="alert"></div>
      <button class="btn btn-danger" onclick="doLogout()">Sign out</button>
    </div>

    <!-- Auth forms (hidden after login) -->
    <div id="authForms">
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tabRegister" onclick="switchTab('register')">Register</button>
      </div>

      <!-- Login form -->
      <form class="form active" id="loginForm" onsubmit="doLogin(event)">
        <div id="loginAlert" class="alert"></div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
      </form>

      <!-- Register form -->
      <form class="form" id="registerForm" onsubmit="doRegister(event)">
        <div id="registerAlert" class="alert"></div>
        <div class="field">
          <label>Full name</label>
          <input type="text" id="regName" placeholder="Alice Smith" required />
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" minlength="6" required />
        </div>
        <button type="submit" class="btn btn-primary" id="registerBtn">Create account</button>
      </form>
    </div>
  </div>
</div>

<script>
  let currentToken = null;

  function switchTab(tab) {
    document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
    document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    clearAlert('loginAlert');
    clearAlert('registerAlert');
  }

  function showAlert(id, message, type) {
    const el = document.getElementById(id);
    el.textContent = message;
    el.className = 'alert show alert-' + type;
  }

  function clearAlert(id) {
    const el = document.getElementById(id);
    el.className = 'alert';
    el.textContent = '';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    if (loading) {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Please wait…';
    } else {
      btn.disabled = false;
      btn.innerHTML = btn.id === 'loginBtn' ? 'Sign in' : 'Create account';
    }
  }

  function showSession(data) {
    currentToken = data.accessToken;
    document.getElementById('authForms').style.display = 'none';
    document.getElementById('sessionPanel').classList.add('show');
    document.getElementById('sessionNombre').textContent = data.nombre;
    document.getElementById('avatarInitial').textContent = data.nombre.charAt(0).toUpperCase();
    document.getElementById('sessionUserId').textContent = '#' + data.userId;
    document.getElementById('sessionToken').textContent = data.accessToken;
    clearAlert('logoutAlert');
  }

  function showAuthForms() {
    currentToken = null;
    document.getElementById('sessionPanel').classList.remove('show');
    document.getElementById('authForms').style.display = '';
  }

  async function doLogin(e) {
    e.preventDefault();
    clearAlert('loginAlert');
    setLoading('loginBtn', true);
    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('loginEmail').value,
          password: document.getElementById('loginPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert('loginAlert', data.message || 'Login failed', 'error');
      } else {
        showSession(data);
      }
    } catch {
      showAlert('loginAlert', 'Network error — is the server running?', 'err2or');
    } finally {
      setLoading('loginBtn', false);
    }
  }

  async function doRegister(e) {
    e.preventDefault();
    clearAlert('registerAlert');
    setLoading('registerBtn', true);
    try {
      const res = await fetch('/auth/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('regName').value,
          email: document.getElementById('regEmail').value,
          password: document.getElementById('regPassword').value
        })
      });
      const data = await res.json();
      if (!res.ok) {
        showAlert('registerAlert', data.message || 'Registration failed', 'error');
      } else {
        showSession(data);
      }
    } catch {
      showAlert('registerAlert', 'Network error — is the server running?', 'error');
    } finally {
      setLoading('registerBtn', false);
    }
  }

  async function doLogout() {
    if (!currentToken) return;
    try {
      const res = await fetch('/auth/logout', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + currentToken }
      });
      if (res.ok || res.status === 401) {
        showAuthForms();
      } else {
        showAlert('logoutAlert', 'Logout failed, please try again', 'error');
      }
    } catch {
      showAlert('logoutAlert', 'Network error during logout', 'error');
    }
  }

  function copyToken() {
    if (!currentToken) return;
    navigator.clipboard.writeText(currentToken).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
