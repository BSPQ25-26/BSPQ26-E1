# Configuración para usar H2 en memoria (simulando PostgreSQL)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Dialecto de H2 y creación automática de tablas
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Mocking Security for Tests
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://dummy-uri.com
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://dummy-uri.com

# Disable Supabase specific properties if they cause issues
supabase.url=https://dummy.supabase.co
supabase.anon-key=dummy-key

# Logging configuration for tests
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.deprecation=ERROR

